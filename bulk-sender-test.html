<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Sender Test - WhatsApp Toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .file-input {
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .file-input input {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .campaigns-list {
            margin-top: 30px;
        }
        .campaign-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .campaign-info {
            flex: 1;
        }
        .campaign-name {
            font-weight: 600;
            color: #333;
        }
        .campaign-stats {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .campaign-actions button {
            padding: 8px 15px;
            margin-left: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-start {
            background: #28a745;
            color: white;
        }
        .btn-pause {
            background: #ffc107;
            color: #333;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .file-list {
            margin-top: 10px;
        }
        .file-item {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Bulk Sender Test</h1>
        <p class="subtitle">Test bulk WhatsApp campaigns with media support</p>

        <div class="form-group">
            <label>Campaign Name</label>
            <input type="text" id="campaignName" placeholder="e.g., Summer Sale 2024">
        </div>

        <div class="form-group">
            <label>Message Template</label>
            <textarea id="message" placeholder="Hi {name}, check out our offers in {city}!&#10;&#10;Use variables: {name}, {phone}, {city}, {date}, {time}"></textarea>
        </div>

        <div class="form-group">
            <label>Contacts (JSON)</label>
            <textarea id="contacts" placeholder='[{"name":"John","phone":"919876543210","city":"Mumbai"}]'></textarea>
        </div>

        <div class="form-group">
            <label>Upload Media (Images/Documents/Files)</label>
            <div class="file-input" onclick="document.getElementById('mediaFiles').click()">
                <input type="file" id="mediaFiles" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.csv,.zip,.rar">
                <p>📁 Click to select files or drag & drop</p>
                <p style="font-size: 12px; color: #666; margin-top: 5px;">Max 10 files, 50MB each</p>
            </div>
            <div class="file-list" id="fileList"></div>
        </div>

        <button class="btn" onclick="createCampaign()">Create Campaign</button>
        <button class="btn" style="background: #25D366; margin-left: 10px;" onclick="window.open('whatsapp-qr.html', '_blank')">📱 Connect WhatsApp</button>

        <div class="result" id="result"></div>

        <div class="campaigns-list">
            <h3 style="margin-bottom: 15px;">📋 Active Campaigns</h3>
            <div id="campaignsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:4000/api/bulk';

        // File selection handler
        document.getElementById('mediaFiles').addEventListener('change', function(e) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            Array.from(e.target.files).forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                fileList.appendChild(fileItem);
            });
        });

        async function createCampaign() {
            const name = document.getElementById('campaignName').value;
            const message = document.getElementById('message').value;
            const contactsText = document.getElementById('contacts').value;
            const mediaFiles = document.getElementById('mediaFiles').files;

            if (!name || !message || !contactsText) {
                showResult('Please fill all required fields', 'error');
                return;
            }

            let contacts;
            try {
                contacts = JSON.parse(contactsText);
            } catch (e) {
                showResult('Invalid JSON format for contacts', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('message', message);
            formData.append('contacts', JSON.stringify(contacts));

            // Add media files
            Array.from(mediaFiles).forEach(file => {
                formData.append('media', file);
            });

            try {
                const response = await fetch(`${API_BASE}/campaigns`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showResult(`✅ Campaign created! ID: ${result.campaignId}`, 'success');
                    loadCampaigns();

                    // Clear form
                    document.getElementById('campaignName').value = '';
                    document.getElementById('message').value = '';
                    document.getElementById('contacts').value = '';
                    document.getElementById('mediaFiles').value = '';
                    document.getElementById('fileList').innerHTML = '';
                } else {
                    showResult(`❌ Error: ${result.message}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function loadCampaigns() {
            try {
                const response = await fetch(`${API_BASE}/campaigns`);
                const result = await response.json();

                const campaignsList = document.getElementById('campaignsList');

                if (result.campaigns && result.campaigns.length > 0) {
                    campaignsList.innerHTML = result.campaigns.map(campaign => `
                        <div class="campaign-item">
                            <div class="campaign-info">
                                <div class="campaign-name">${campaign.name}</div>
                                <div class="campaign-stats">
                                    Status: ${campaign.status} |
                                    Total: ${campaign.total_contacts} |
                                    Sent: ${campaign.sent_count} |
                                    Failed: ${campaign.failed_count} |
                                    Pending: ${campaign.pending_count}
                                </div>
                            </div>
                            <div class="campaign-actions">
                                ${campaign.status !== 'completed' ? `
                                    <button class="btn-start" onclick="startCampaign(${campaign.id})">▶️ Start</button>
                                    <button class="btn-pause" onclick="pauseCampaign()">⏸️ Pause</button>
                                ` : ''}
                                <button class="btn-delete" onclick="deleteCampaign(${campaign.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    campaignsList.innerHTML = '<p style="color: #666;">No campaigns yet. Create one above!</p>';
                }
            } catch (error) {
                console.error('Error loading campaigns:', error);
            }
        }

        async function startCampaign(id) {
            try {
                const response = await fetch(`${API_BASE}/campaigns/${id}/start`, {
                    method: 'POST'
                });
                const result = await response.json();
                showResult(`✅ Campaign started!`, 'success');
                loadCampaigns();
            } catch (error) {
                showResult(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function pauseCampaign() {
            try {
                const response = await fetch(`${API_BASE}/campaigns/pause`, {
                    method: 'POST'
                });
                const result = await response.json();
                showResult(`⏸️ Campaign paused!`, 'success');
            } catch (error) {
                showResult(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function deleteCampaign(id) {
            if (!confirm('Are you sure you want to delete this campaign?')) return;

            try {
                const response = await fetch(`${API_BASE}/campaigns/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                showResult(`🗑️ Campaign deleted!`, 'success');
                loadCampaigns();
            } catch (error) {
                showResult(`❌ Error: ${error.message}`, 'error');
            }
        }

        function showResult(message, type) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.className = `result ${type}`;
            result.style.display = 'block';

            setTimeout(() => {
                result.style.display = 'none';
            }, 5000);
        }

        // Load campaigns on page load
        loadCampaigns();
    </script>
</body>
</html>
