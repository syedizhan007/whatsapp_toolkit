<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - WhatsApp Toolkit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark-bg: #0a0e27;
            --card-bg: rgba(15, 23, 42, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .controls-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .control-card h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }

        .quick-grant {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quick-grant input {
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .quick-grant input:focus {
            border-color: var(--success);
        }

        .quick-grant button {
            padding: 12px;
            background: linear-gradient(135deg, var(--success), #059669);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quick-grant button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .table-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-header h3 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(0, 0, 0, 0.3);
        }

        th {
            padding: 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .status-badge.none {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .approve-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, var(--success), #059669);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .reject-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, var(--danger), #dc2626);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .revoke-btn {
            padding: 8px 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .revoke-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .controls-section {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 12px 8px;
            }

            .actions-cell {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👑 Toolkit Admin Dashboard</h1>
            <p>Manage user subscriptions and payment verifications (Smart Calendar Expiry Guard Active)</p>
        </div>

        <div class="controls-section">
            <div class="control-card">
                <h3><i class="fas fa-search"></i> Search Users (Press Enter to Deep Search Database)</h3>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Type to filter, or paste Transaction ID and press Enter...">
                </div>
            </div>

            <div class="control-card">
                <h3><i class="fas fa-bolt"></i> Quick Grant Access</h3>
                <div class="quick-grant">
                    <input type="email" id="grant-email" placeholder="Enter user email...">
                    <button id="btn-quick-grant">
                        <i class="fas fa-check-circle"></i>
                        Activate Premium
                    </button>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <h3>Users List</h3>
                <span class="badge pending" id="pending-count">0 Pending</span>
            </div>

            <div id="loading-state" class="loading">
                <div class="spinner"></div>
                <p>Loading users...</p>
            </div>

            <div id="table-container" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>User Email</th>
                            <th>Transaction ID</th>
                            <th>Status / Days Left</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        </tbody>
                </table>
            </div>

            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>No users found</p>
            </div>
        </div>
    </div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            window.supabaseClient = window.supabase.createClient(
                'https://xrphyjkrzolqyowkkvzf.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhycGh5amtyem9scXlvd2trdnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NjM5NTIsImV4cCI6MjA5MzUzOTk1Mn0.Tk-ESBR82crBvISHFJAP2JE_zmkUc4YRgB7VgQtRBFE',
                {
                    auth: {
                        persistSession: true,
                        detectSessionInUrl: true,
                        autoRefreshToken: true,
                        storage: window.localStorage
                    }
                }
            );
        }

        const db = window.supabaseClient;
        let allUsers = [];
        let currentSearchTerm = '';

        window.addEventListener('DOMContentLoaded', () => {
            loadUsers();

            const searchInput = document.getElementById('search-input');

            searchInput.addEventListener('input', (e) => {
                currentSearchTerm = e.target.value.toLowerCase().trim();
                filterAndRenderUsers();
            });

            searchInput.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const queryTerm = searchInput.value.trim();
                    if (queryTerm) {
                        await performDeepDatabaseSearch(queryTerm);
                    }
                }
            });

            document.getElementById('btn-quick-grant').addEventListener('click', quickGrantAccess);
        });

        async function loadUsers() {
            try {
                const loadingState = document.getElementById('loading-state');
                const tableContainer = document.getElementById('table-container');
                const emptyState = document.getElementById('empty-state');

                loadingState.style.display = 'block';
                tableContainer.style.display = 'none';
                emptyState.style.display = 'none';

                const { data, error } = await db
                    .from('profiles')
                    .select('id, email, submitted_trxid, subscription_status, is_premium, updated_at')
                    .order('updated_at', { ascending: false });

                if (error) throw error;

                allUsers = data || [];
                filterAndRenderUsers();

                loadingState.style.display = 'none';
            } catch (error) {
                console.error('Backend fetch failed:', error);
                alert('Backend Fetch Error: ' + error.message);
                document.getElementById('loading-state').style.display = 'none';
            }
        }

        async function performDeepDatabaseSearch(term) {
            try {
                const loadingState = document.getElementById('loading-state');
                loadingState.style.display = 'block';

                const { data, error } = await db
                    .from('profiles')
                    .select('id, email, submitted_trxid, subscription_status, is_premium, updated_at')
                    .or(`submitted_trxid.eq.${term},email.eq.${term}`);

                if (error) throw error;

                if (data && data.length > 0) {
                    data.forEach(foundUser => {
                        if (!allUsers.some(u => u.id === foundUser.id)) {
                            allUsers.unshift(foundUser);
                        }
                    });
                    
                    currentSearchTerm = term.toLowerCase();
                    filterAndRenderUsers();
                } else {
                    alert(`🔍 No match found in complete database for: "${term}"`);
                }
                loadingState.style.display = 'none';
            } catch (error) {
                console.error('Deep DB Search Failed:', error);
                alert('Database Search Error: ' + error.message);
                document.getElementById('loading-state').style.display = 'none';
            }
        }

        function filterAndRenderUsers() {
            let filteredUsers = allUsers;

            if (currentSearchTerm) {
                filteredUsers = allUsers.filter(user =>
                    user.email?.toLowerCase().includes(currentSearchTerm) ||
                    user.submitted_trxid?.toLowerCase().includes(currentSearchTerm)
                );
            }

            renderUsers(filteredUsers);
        }

        function renderUsers(users) {
            const tbody = document.getElementById('users-tbody');
            const tableContainer = document.getElementById('table-container');
            const emptyState = document.getElementById('empty-state');
            const pendingCount = document.getElementById('pending-count');

            const pendingUsers = allUsers.filter(u => u.subscription_status === 'pending').length;
            pendingCount.textContent = `${pendingUsers} Pending`;

            if (users.length === 0) {
                tableContainer.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            tableContainer.style.display = 'block';
            emptyState.style.display = 'none';

            tbody.innerHTML = users.map(user => {
                let actionButtons = '';
                let statusDisplay = '';
                
                let daysLeft = 30;
                let isExpired = false;
                
                if (user.subscription_status === 'active' && user.updated_at) {
                    const approvalDate = new Date(user.updated_at);
                    const today = new Date();
                    
                    // UPGRADE: Exact calendar month calculation (Handles 28/29/30/31 days dynamically)
                    const expiryDate = new Date(approvalDate);
                    expiryDate.setMonth(expiryDate.getMonth() + 1);
                    
                    const diffTime = expiryDate - today;
                    daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (daysLeft <= 0) {
                        isExpired = true;
                    }
                }

                if (isExpired) {
                    statusDisplay = `<span class="status-badge expired">Expired (Month Finished)</span>`;
                    actionButtons = `
                        <button class="approve-btn" onclick="window.approveUser('${user.id}', '${user.email}')">
                            <i class="fas fa-undo"></i> Re-Approve
                        </button>
                    `;
                } else if (user.subscription_status === 'pending') {
                    statusDisplay = `<span class="status-badge pending">pending</span>`;
                    actionButtons = `
                        <button class="approve-btn" onclick="window.approveUser('${user.id}', '${user.email}')">
                            <i class="fas fa-check"></i> Approve
                        </button>
                        <button class="reject-btn" onclick="window.rejectUser('${user.id}', '${user.email}')">
                            <i class="fas fa-times"></i> Reject
                        </button>
                    `;
                } else if (user.subscription_status === 'active' || user.is_premium === true) {
                    statusDisplay = `<span class="status-badge active">active (${daysLeft}d left)</span>`;
                    actionButtons = `
                        <button class="revoke-btn" onclick="window.revokeUser('${user.id}', '${user.email}')">
                            <i class="fas fa-lock"></i> Revoke Access (Lock)
                        </button>
                    `;
                } else {
                    statusDisplay = `<span class="status-badge none">${user.subscription_status || 'none'}</span>`;
                    actionButtons = `
                        <button class="approve-btn" onclick="window.approveUser('${user.id}', '${user.email}')">
                            <i class="fas fa-undo"></i> Re-Approve
                        </button>
                    `;
                }

                return `
                    <tr>
                        <td>${user.email || 'N/A'}</td>
                        <td>${user.submitted_trxid || '-'}</td>
                        <td>${statusDisplay}</td>
                        <td>
                            <div class="actions-cell">
                                ${actionButtons}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function approveUser(userId, email) {
            if (!confirm(`Approve/Re-Approve premium subscription for ${email}? (Resets calendar month counter)`)) return;

            try {
                const { error } = await db
                    .from('profiles')
                    .update({
                        is_premium: true,
                        subscription_status: 'active',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) throw error;

                alert(`✅ Account activated/renewed successfully: ${email}`);
                loadUsers();
            } catch (error) {
                console.error('Approval sync failed:', error);
                alert('Backend Update Failed: ' + error.message);
            }
        }

        async function rejectUser(userId, email) {
            if (!confirm(`Are you sure you want to REJECT ${email}?`)) return;

            try {
                const { error } = await db
                    .from('profiles')
                    .update({
                        is_premium: false,
                        subscription_status: 'rejected',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) throw error;

                alert(`✕ Request marked as rejected for: ${email}`);
                loadUsers();
            } catch (error) {
                console.error('Rejection sync failed:', error);
                alert('Backend Update Failed: ' + error.message);
            }
        }

        async function revokeUser(userId, email) {
            if (!confirm(`⚠️ WARNING: Are you sure you want to LOCK and REMOVE premium access for ${email}?`)) return;

            try {
                const { error } = await db
                    .from('profiles')
                    .update({
                        is_premium: false,
                        subscription_status: 'none',
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', userId);

                if (error) throw error;

                alert(`🔒 Premium Access Revoked & Locked successfully: ${email}`);
                loadUsers();
            } catch (error) {
                console.error('Revocation sync failed:', error);
                alert('Backend Revoke Failed: ' + error.message);
            }
        }

        async function quickGrantAccess() {
            const emailInput = document.getElementById('grant-email');
            const email = emailInput.value.trim().toLowerCase();

            if (!email) {
                alert('Please provide a valid user email address');
                return;
            }

            if (!confirm(`Instantly grant global premium privileges to ${email}?`)) return;

            try {
                const { error } = await db
                    .from('profiles')
                    .update({
                        is_premium: true,
                        subscription_status: 'active',
                        updated_at: new Date().toISOString()
                    })
                    .eq('email', email);

                if (error) throw error;

                alert(`✅ Access Override Successful: ${email}`);
                emailInput.value = '';
                loadUsers();
            } catch (error) {
                console.error('Quick grant pipeline failed:', error);
                alert('Backend Overpass Failed: ' + error.message);
            }
        }

        window.approveUser = approveUser;
        window.rejectUser = rejectUser;
        window.revokeUser = revokeUser;
    </script>
</body>
</html>
