<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Force Refresh</title>
    <script>
        // Clear all cache and redirect
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
        
        // Clear localStorage
        localStorage.clear();
        sessionStorage.clear();
        
        // Redirect with cache buster
        setTimeout(function() {
            window.location.href = '/?v=' + Date.now();
        }, 1000);
    </script>
</head>
<body style="background:#000;color:#0f0;font-family:monospace;padding:50px;text-align:center;">
    <h1>🔄 Clearing Cache...</h1>
    <p>Redirecting to dashboard in 1 second...</p>
    <p style="color:#ff0;">If not redirected, click: <a href="/" style="color:#0ff;">Dashboard</a></p>
</body>
</html>
